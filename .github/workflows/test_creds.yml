name: Test Credentials Only

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore and validate YouTube credentials
        env:
          CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          if [ -z "$CLIENT_SECRET" ] || [ -z "$TOKEN" ]; then
            echo "::error::YouTube secrets not set in repo!"
            exit 1
          fi
          python -c "import os; open('client_secret.json','w').write(os.environ['CLIENT_SECRET'])"
          python -c "import os; open('token.json','w').write(os.environ['TOKEN'])"
          echo "=== client_secret.json first 80 chars ==="
          head -c 80 client_secret.json
          echo ""
          echo "=== token.json first 80 chars ==="
          head -c 80 token.json
          echo ""
          echo "=== Validating JSON ==="
          python -c "import json; d=json.load(open('client_secret.json')); print('client_secret.json: OK,', len(str(d)), 'chars')"
          python -c "import json; d=json.load(open('token.json')); print('token.json: OK,', len(str(d)), 'chars')"

      - name: Test actual YouTube API connection
        run: |
          pip install google-auth google-auth-oauthlib google-api-python-client -q
          python << 'EOF'
          import json
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build

          token_data = json.load(open('token.json'))
          creds = Credentials.from_authorized_user_info(token_data, ['https://www.googleapis.com/auth/youtube.upload'])
          youtube = build('youtube', 'v3', credentials=creds)
          response = youtube.channels().list(part='snippet', mine=True).execute()

          if response.get('items'):
              channel = response['items'][0]['snippet']
              print(f"✅ Connected to YouTube channel: {channel['title']}")
              print(f"   Channel ID: {response['items'][0]['id']}")
          else:
              print("❌ No channel found")
              exit(1)
          EOF

      - name: Cleanup
        if: always()
        run: rm -f client_secret.json token.json
