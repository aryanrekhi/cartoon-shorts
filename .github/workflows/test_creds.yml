name: Test Credentials Only

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore and validate YouTube credentials
        env:
          CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          if [ -z "$CLIENT_SECRET" ] || [ -z "$TOKEN" ]; then
            echo "::error::YouTube secrets not set in repo!"
            exit 1
          fi
          python -c "import os; open('client_secret.json','w').write(os.environ['CLIENT_SECRET'])"
          python -c "import os; open('token.json','w').write(os.environ['TOKEN'])"
          echo "=== client_secret.json first 80 chars ==="
          head -c 80 client_secret.json
          echo ""
          echo "=== token.json first 80 chars ==="
          head -c 80 token.json
          echo ""
          echo "=== Validating JSON ==="
          python -c "import json; d=json.load(open('client_secret.json')); print('client_secret.json: OK,', len(str(d)), 'chars')"
          python -c "import json; d=json.load(open('token.json')); print('token.json: OK,', len(str(d)), 'chars')"

      - name: Test that token can be refreshed (proves it's valid for uploads)
        run: |
          pip install google-auth google-auth-oauthlib -q
          python << 'EOF'
          import json
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request

          token_data = json.load(open('token.json'))
          scopes = token_data.get('scopes', [])
          print(f"Token scopes: {scopes}")

          creds = Credentials.from_authorized_user_info(token_data, scopes)

          if creds.expired and creds.refresh_token:
              print("Token expired, refreshing...")
              creds.refresh(Request())
              print("✅ Token refreshed successfully — credentials are valid")
          elif creds.valid:
              print("✅ Token is currently valid")
          else:
              print("❌ Token cannot be refreshed — need to re-auth locally")
              exit(1)

          if 'https://www.googleapis.com/auth/youtube.upload' in scopes:
              print("✅ Upload scope is present — uploads should work")
          else:
              print(f"⚠️  Upload scope NOT in token. Found scopes: {scopes}")
              exit(1)
          EOF

      - name: Cleanup
        if: always()
        run: rm -f client_secret.json token.json
