name: Test LLM Failover Only

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: AUDIT - find all calls to pollinations_llm functions
        run: |
          echo "============================================================"
          echo "Listing every call to functions from pollinations_llm.py"
          echo "============================================================"
          python << 'EOF'
          import re
          from pathlib import Path

          # functions defined in pollinations_llm.py
          func_names = ["ask", "generate_script", "enhance_visual_prompt"]

          py_files = [p for p in Path(".").rglob("*.py") if "pollinations_llm.py" not in str(p)]

          for fname in func_names:
              print(f"\n--- Calls to {fname}() ---")
              found_any = False
              for pyf in py_files:
                  try:
                      lines = pyf.read_text(encoding="utf-8").split("\n")
                  except Exception:
                      continue
                  for i, line in enumerate(lines, 1):
                      if re.search(rf"\b{fname}\s*\(", line):
                          # capture multi-line call if needed
                          call = line
                          j = i
                          while call.count("(") > call.count(")") and j < len(lines):
                              call += " " + lines[j].strip()
                              j += 1
                          # extract kwargs
                          kwargs = re.findall(r"(\w+)\s*=", call.split("(", 1)[1] if "(" in call else "")
                          # filter only real kwargs (not = inside strings/numbers)
                          print(f"  {pyf}:{i}")
                          print(f"    line: {line.strip()[:120]}")
                          if kwargs:
                              print(f"    kwargs used: {kwargs}")
                          found_any = True
              if not found_any:
                  print(f"  (no calls found)")

          # Also show what each function currently accepts
          print("\n============================================================")
          print("CURRENT SIGNATURES in pollinations_llm.py")
          print("============================================================")
          import inspect
          import pollinations_llm
          for fname in func_names:
              if hasattr(pollinations_llm, fname):
                  fn = getattr(pollinations_llm, fname)
                  sig = inspect.signature(fn)
                  print(f"  {fname}{sig}")
          EOF
