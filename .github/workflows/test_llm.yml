name: Test LLM Failover Only

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test each provider in pollinations_llm.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: |
          python << 'EOF'
          import logging
          logging.basicConfig(level=logging.DEBUG, format="%(message)s")
          from pollinations_llm import _try_groq, _try_gemini, _try_cerebras, _try_pollinations

          test_prompt = "Say 'hello world' in exactly 3 words."

          print("="*70)
          print("Testing GROQ via pollinations_llm._try_groq")
          print("="*70)
          result = _try_groq(test_prompt)
          if result:
              print(f"✅ GROQ WORKS: {result[:100]}")
          else:
              print("❌ GROQ failed (see debug logs above)")

          print()
          print("="*70)
          print("Testing GEMINI via pollinations_llm._try_gemini")
          print("="*70)
          result = _try_gemini(test_prompt)
          if result:
              print(f"✅ GEMINI WORKS: {result[:100]}")
          else:
              print("❌ GEMINI failed (see debug logs above)")

          print()
          print("="*70)
          print("Testing CEREBRAS via pollinations_llm._try_cerebras")
          print("="*70)
          result = _try_cerebras(test_prompt)
          if result:
              print(f"✅ CEREBRAS WORKS: {result[:100]}")
          else:
              print("❌ CEREBRAS failed (see debug logs above)")

          print()
          print("="*70)
          print("Testing POLLINATIONS via pollinations_llm._try_pollinations")
          print("="*70)
          result = _try_pollinations(test_prompt)
          if result:
              print(f"✅ POLLINATIONS WORKS: {result[:100]}")
          else:
              print("❌ POLLINATIONS failed (see debug logs above)")

          print()
          print("="*70)
          print("SUMMARY: provider count working = check output above")
          print("="*70)
          EOF
